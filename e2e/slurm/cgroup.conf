# The Docker-backed e2e cluster does not run systemd/dbus and Docker Desktop's
# cgroup hierarchy is not writable enough for Slurm's cgroup/v2 plugin.
# Production clusters should keep their site cgroup policy; this is only for
# the disposable demo cluster.
CgroupPlugin=disabled
