# Initial sandbox policy for the agent-driven policy demo.
#
# The demo exercises two denial → proposal → review loops:
#
#  - Step 1 hits raw.githubusercontent.com (no credential in scope). The
#    host is pre-listed at L7 with no allowed paths, so the agent's GET
#    structured-403's. The agent proposes the exact path and the host-side
#    demo driver approves the pending unmanaged proposal.
#
#  - Step 2 hits api.github.com PUT (github credential in scope). The
#    host is pre-allowed for read-only access, so the PUT
#    structured-403's. The agent proposes the narrow PUT path. The chunk
#    lands in pending for human review; demo.sh approves on behalf.
#
# Every proposal waits because the sandbox has no managed maximum. Set
# DEMO_MANUAL_APPROVE=1 to make the developer issue each decision directly.

version: 1

filesystem_policy:
  include_workdir: true
  read_only: [/usr, /lib, /proc, /dev/urandom, /app, /etc, /var/log]
  read_write: [/sandbox, /tmp, /dev/null]

landlock:
  compatibility: best_effort

process:
  run_as_user: sandbox
  run_as_group: sandbox

network_policies:
  codex:
    name: codex
    endpoints:
      - { host: api.openai.com, port: 443, protocol: rest, enforcement: enforce, access: full }
      - { host: auth.openai.com, port: 443, protocol: rest, enforcement: enforce, access: full }
      - { host: chatgpt.com, port: 443, protocol: rest, enforcement: enforce, access: full }
      - { host: ab.chatgpt.com, port: 443, protocol: rest, enforcement: enforce, access: full }
    binaries:
      - { path: /usr/bin/codex }
      - { path: /sandbox/payload/codex }
      - { path: /usr/bin/node }
      - { path: "/usr/lib/node_modules/@openai/**" }

  github_api_readonly:
    # api.github.com pre-allowed for read-only access. Writes (PUT/POST/PATCH/DELETE)
    # structured-403 at L7 — the agent proposes the specific method/path,
    # and the reviewer sees the exact requested method and path.
    name: github-api-readonly
    endpoints:
      - host: api.github.com
        port: 443
        protocol: rest
        enforcement: enforce
        access: read-only
    binaries:
      - { path: /usr/bin/curl }

  github_raw_scoped:
    # raw.githubusercontent.com — pre-listed at L7 with one bootstrap
    # path so the L7 validator accepts the rule. The agent must propose
    # any additional GET paths it actually needs.
    name: github-raw-scoped
    endpoints:
      - host: raw.githubusercontent.com
        port: 443
        protocol: rest
        enforcement: enforce
        rules:
          - allow:
              method: GET
              path: /github/rest-api-description/main/README.md
    binaries:
      - { path: /usr/bin/curl }
