syntax = "proto3";

package openshell.credentials.v1;

import "datamodel.proto";

// Internal credential-driver contract used by the gateway.
//
// The gateway owns provider semantics and sandbox delivery. Credential drivers
// own backend-specific storage, deletion, authentication, and lookup for
// gateway-managed credential handles.
service CredentialDriver {
  // Report driver identity and feature support.
  rpc GetCapabilities(GetCredentialDriverCapabilitiesRequest)
      returns (GetCredentialDriverCapabilitiesResponse);

  // Store or overwrite one provider credential and return an opaque handle.
  rpc StoreCredential(StoreCredentialRequest) returns (StoreCredentialResponse);

  // Delete one provider credential handle.
  rpc DeleteCredential(DeleteCredentialRequest) returns (DeleteCredentialResponse);

  // Resolve a batch of credential handles into string secret values.
  rpc ResolveCredentials(ResolveCredentialsRequest)
      returns (ResolveCredentialsResponse);

  // Optionally list discoverable credentials. Drivers may return UNIMPLEMENTED.
  rpc ListCredentials(ListCredentialsRequest) returns (ListCredentialsResponse);
}

message GetCredentialDriverCapabilitiesRequest {}

message GetCredentialDriverCapabilitiesResponse {
  // Human-readable driver name.
  string driver_name = 1;
  // Driver implementation version string.
  string driver_version = 2;
  // Backend kind, such as "macos-keychain", "kubernetes-secrets", or "openbao".
  string backend_kind = 3;
  // True when ListCredentials is supported.
  bool supports_list = 4;
  // True when ResolveCredentials may return expires_at_ms values.
  bool supports_expires_at = 5;
}

message StoreCredentialRequest {
  // Provider instance name supplied for audit and backend policy decisions.
  string provider_name = 1;
  // Provider credential key that will receive the resolved value at runtime.
  string credential_key = 2;
  // Secret value to store. Drivers must never log this field.
  string value = 3;
  // Existing handle to overwrite, if any.
  openshell.datamodel.v1.CredentialHandle existing_handle = 4;
}

message StoreCredentialResponse {
  // Opaque handle for later resolution/deletion.
  openshell.datamodel.v1.CredentialHandle handle = 1;
}

message DeleteCredentialRequest {
  // Provider instance name supplied for audit and backend policy decisions.
  string provider_name = 1;
  // Provider credential key that owns the handle.
  string credential_key = 2;
  // Opaque handle to delete.
  openshell.datamodel.v1.CredentialHandle handle = 3;
}

message DeleteCredentialResponse {}

message ResolveCredentialsRequest {
  repeated ResolveCredentialRequest credentials = 1;
}

message ResolveCredentialRequest {
  // Gateway-chosen opaque ID used to correlate batch responses.
  string request_id = 1;
  // Provider instance name supplied for audit and backend policy decisions.
  string provider_name = 2;
  // Provider credential key that will receive the resolved value.
  string credential_key = 3;
  // Opaque handle to resolve.
  openshell.datamodel.v1.CredentialHandle handle = 4;
}

message ResolveCredentialsResponse {
  repeated ResolvedCredential credentials = 1;
}

message ResolvedCredential {
  // Echoes ResolveCredentialRequest.request_id.
  string request_id = 1;
  // Secret string value. Drivers must never log this field.
  string value = 2;
  // Expiration timestamp in milliseconds since Unix epoch, or zero when absent.
  int64 expires_at_ms = 3;
}

message ListCredentialsRequest {}

message ListCredentialsResponse {
  repeated ListedCredential credentials = 1;
}

message ListedCredential {
  // Opaque handle identifier or driver-owned display name.
  string handle = 1;
  // Available credential keys under the backend object.
  repeated string keys = 2;
  // Driver-owned non-secret metadata.
  map<string, string> metadata = 3;
}
