# Envoy GatewayClass for OpenShell.
#
# Apply after a successful Skaffold deploy when gateway routing is enabled:
#   mise run helm:gateway:apply

---
# The Envoy Gateway Helm chart does not create a GatewayClass — we manage it here.
# The proxy Service defaults to LoadBalancer, which klipper-lb handles in k3d.
apiVersion: gateway.networking.k8s.io/v1
kind: GatewayClass
metadata:
  name: eg
spec:
  controllerName: gateway.envoyproxy.io/gatewayclass-controller
---
# OpenShell gRPC streams can remain active across sandbox create, exec, relay,
# and watch operations. Disable Envoy's backend request and stream duration
# timeouts for the OpenShell GRPCRoute so the proxy does not reset long-running
# HTTP/2 streams while gateway pods rotate behind it.
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: BackendTrafficPolicy
metadata:
  name: openshell-grpc-timeouts
  namespace: openshell
  labels:
    app.kubernetes.io/name: openshell
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: GRPCRoute
      name: openshell
  timeout:
    http:
      requestTimeout: 0s
      maxStreamDuration: 0s
