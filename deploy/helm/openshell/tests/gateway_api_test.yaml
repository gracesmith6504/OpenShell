suite: Gateway API resources
templates:
  - templates/gateway-config.yaml
  - templates/gateway.yaml
  - templates/grpcroute.yaml
  - templates/statefulset.yaml
  - templates/tlsroute.yaml
release:
  name: openshell
  namespace: my-namespace

tests:
  - it: does not render Gateway API resources by default
    template: templates/gateway.yaml
    asserts:
      - hasDocuments:
          count: 0

  - it: does not render a GRPCRoute by default
    template: templates/grpcroute.yaml
    asserts:
      - hasDocuments:
          count: 0

  - it: does not render a TLSRoute by default
    template: templates/tlsroute.yaml
    asserts:
      - hasDocuments:
          count: 0

  - it: renders a Gateway independently with a fixed HTTP listener
    template: templates/gateway.yaml
    set:
      gatewayApi.gateway.create: true
    asserts:
      - hasDocuments:
          count: 1
      - equal:
          path: metadata.name
          value: openshell
      - equal:
          path: metadata.namespace
          value: my-namespace
      - equal:
          path: spec.gatewayClassName
          value: eg
      - equal:
          path: spec.listeners[0].name
          value: http
      - equal:
          path: spec.listeners[0].port
          value: 80
      - equal:
          path: spec.listeners[0].protocol
          value: HTTP
      - notExists:
          path: spec.listeners[0].allowedRoutes
      - notExists:
          path: spec.listeners[0].tls

  - it: does not render a Gateway when only TLSRoute is enabled
    template: templates/gateway.yaml
    set:
      gatewayApi.routes.tls.enabled: true
    asserts:
      - hasDocuments:
          count: 0

  - it: adds a fixed TLS passthrough listener to a chart-created Gateway
    template: templates/gateway.yaml
    set:
      gatewayApi.gateway.create: true
      gatewayApi.routes.tls.enabled: true
    asserts:
      - hasDocuments:
          count: 1
      - equal:
          path: spec.listeners[0].name
          value: http
      - equal:
          path: spec.listeners[1].name
          value: tls
      - equal:
          path: spec.listeners[1].port
          value: 443
      - equal:
          path: spec.listeners[1].protocol
          value: TLS
      - equal:
          path: spec.listeners[1].tls.mode
          value: Passthrough
      - notExists:
          path: spec.listeners[1].hostname
      - notExists:
          path: spec.listeners[1].tls.certificateRefs

  - it: renders a GRPCRoute independently for a pre-existing Gateway
    template: templates/grpcroute.yaml
    set:
      gatewayApi.routes.grpc.enabled: true
      gatewayApi.gateway.name: external-gateway
      gatewayApi.gateway.namespace: ingress-system
      gatewayApi.routes.grpc.hostnames:
        - openshell.example.com
    asserts:
      - hasDocuments:
          count: 1
      - equal:
          path: spec.parentRefs[0].name
          value: external-gateway
      - equal:
          path: spec.parentRefs[0].namespace
          value: ingress-system
      - equal:
          path: spec.hostnames[0]
          value: openshell.example.com
      - equal:
          path: spec.rules[0].backendRefs[0].name
          value: openshell
      - equal:
          path: spec.rules[0].backendRefs[0].port
          value: 8080

  - it: renders a TLSRoute independently for a pre-existing Gateway
    template: templates/tlsroute.yaml
    set:
      gatewayApi.routes.tls.enabled: true
      gatewayApi.gateway.name: external-gateway
      gatewayApi.gateway.namespace: ingress-system
      gatewayApi.routes.tls.hostnames:
        - openshell.example.com
    asserts:
      - hasDocuments:
          count: 1
      - equal:
          path: apiVersion
          value: gateway.networking.k8s.io/v1
      - equal:
          path: kind
          value: TLSRoute
      - equal:
          path: spec.parentRefs[0].name
          value: external-gateway
      - equal:
          path: spec.parentRefs[0].namespace
          value: ingress-system
      - equal:
          path: spec.hostnames[0]
          value: openshell.example.com
      - equal:
          path: spec.rules[0].backendRefs[0].name
          value: openshell
      - equal:
          path: spec.rules[0].backendRefs[0].port
          value: 8080

  - it: renders the Gateway and GRPCRoute together using shared identity
    template: templates/gateway.yaml
    set:
      gatewayApi.gateway.create: true
      gatewayApi.gateway.name: shared-gateway
      gatewayApi.routes.grpc.enabled: true
    asserts:
      - equal:
          path: metadata.name
          value: shared-gateway
      - equal:
          path: metadata.namespace
          value: my-namespace

  - it: uses shared Gateway identity when both resources are enabled
    template: templates/grpcroute.yaml
    set:
      gatewayApi.gateway.create: true
      gatewayApi.gateway.name: shared-gateway
      gatewayApi.routes.grpc.enabled: true
    asserts:
      - equal:
          path: spec.parentRefs[0].name
          value: shared-gateway
      - equal:
          path: spec.parentRefs[0].namespace
          value: my-namespace

  - it: fails with guidance when legacy grpcRoute values are supplied
    template: templates/statefulset.yaml
    set:
      grpcRoute.enabled: true
    asserts:
      - failedTemplate:
          errorPattern: "grpcRoute values were replaced by gatewayApi"

  - it: rejects TLS passthrough when gateway server TLS is disabled
    template: templates/statefulset.yaml
    set:
      gatewayApi.routes.tls.enabled: true
      server.disableTls: true
    asserts:
      - failedTemplate:
          errorPattern: "gatewayApi.routes.tls.enabled requires server.disableTls=false"
