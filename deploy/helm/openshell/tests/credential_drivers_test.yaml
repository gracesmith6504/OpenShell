suite: credential drivers
templates:
  - templates/gateway-config.yaml
  - templates/statefulset.yaml
  - templates/credential-secrets-role.yaml
  - templates/credential-secrets-rolebinding.yaml
release:
  name: openshell
  namespace: my-namespace

tests:
  - it: omits credential drivers by default
    template: templates/gateway-config.yaml
    asserts:
      - notMatchRegex:
          path: data["gateway.toml"]
          pattern: 'credential_drivers\s*='
      - notMatchRegex:
          path: data["gateway.toml"]
          pattern: '\[openshell\.credential_drivers\.'

  - it: renders Kubernetes Secrets credential driver config
    template: templates/gateway-config.yaml
    set:
      server.credentialDrivers.default: kubernetes-secrets
      server.credentialDrivers.kubernetesSecrets.enabled: true
      server.credentialDrivers.kubernetesSecrets.namespace: provider-secrets
    asserts:
      - matchRegex:
          path: data["gateway.toml"]
          pattern: 'credential_drivers\s*=\s*\["kubernetes-secrets"\]'
      - matchRegex:
          path: data["gateway.toml"]
          pattern: 'default_credential_driver\s*=\s*"kubernetes-secrets"'
      - matchRegex:
          path: data["gateway.toml"]
          pattern: '(?ms)\[openshell\.credential_drivers\.kubernetes-secrets\].*?namespace\s*=\s*"provider-secrets".*?allow_reference_namespace\s*=\s*false'
      - notMatchRegex:
          path: data["gateway.toml"]
          pattern: 'transport\s*=\s*"in_tree"'

  - it: renders OpenBao credential driver config
    template: templates/gateway-config.yaml
    set:
      server.credentialDrivers.default: openbao
      server.credentialDrivers.openbao.enabled: true
      server.credentialDrivers.openbao.address: http://openbao.openbao.svc.cluster.local:8200
      server.credentialDrivers.openbao.role: openshell-gateway
    asserts:
      - matchRegex:
          path: data["gateway.toml"]
          pattern: 'credential_drivers\s*=\s*\["openbao"\]'
      - matchRegex:
          path: data["gateway.toml"]
          pattern: 'default_credential_driver\s*=\s*"openbao"'
      - matchRegex:
          path: data["gateway.toml"]
          pattern: '(?ms)\[openshell\.credential_drivers\.openbao\].*?address\s*=\s*"http://openbao\.openbao\.svc\.cluster\.local:8200".*?auth_method\s*=\s*"kubernetes".*?role\s*=\s*"openshell-gateway"'
      - notMatchRegex:
          path: data["gateway.toml"]
          pattern: 'transport\s*=\s*"in_tree"'

  - it: rejects multiple enabled credential drivers
    template: templates/statefulset.yaml
    set:
      server.credentialDrivers.default: kubernetes-secrets
      server.credentialDrivers.kubernetesSecrets.enabled: true
      server.credentialDrivers.openbao.enabled: true
      server.credentialDrivers.openbao.address: http://openbao.openbao.svc.cluster.local:8200
      server.credentialDrivers.openbao.role: openshell-gateway
    asserts:
      - failedTemplate:
          errorPattern: "only one server.credentialDrivers backend can be enabled at a time"

  - it: creates namespaced Kubernetes Secret manager RBAC
    template: templates/credential-secrets-role.yaml
    set:
      server.credentialDrivers.kubernetesSecrets.enabled: true
      server.credentialDrivers.kubernetesSecrets.namespace: provider-secrets
    asserts:
      - equal:
          path: metadata.namespace
          value: provider-secrets
      - equal:
          path: rules[0].resources[0]
          value: secrets
      - equal:
          path: rules[0].verbs[0]
          value: get
      - contains:
          path: rules[0].verbs
          content: create
      - contains:
          path: rules[0].verbs
          content: patch
      - contains:
          path: rules[0].verbs
          content: delete

  - it: binds Kubernetes Secret manager RBAC to the gateway ServiceAccount
    template: templates/credential-secrets-rolebinding.yaml
    set:
      server.credentialDrivers.kubernetesSecrets.enabled: true
      server.credentialDrivers.kubernetesSecrets.namespace: provider-secrets
    asserts:
      - equal:
          path: metadata.namespace
          value: provider-secrets
      - equal:
          path: subjects[0].name
          value: openshell
      - equal:
          path: subjects[0].namespace
          value: my-namespace

  - it: rejects a default credential driver that is not enabled
    template: templates/statefulset.yaml
    set:
      server.credentialDrivers.default: openbao
      server.credentialDrivers.kubernetesSecrets.enabled: true
    asserts:
      - failedTemplate:
          errorPattern: "server.credentialDrivers.default must name an enabled credential driver"
