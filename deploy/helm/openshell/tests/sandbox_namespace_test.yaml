suite: sandboxNamespace defaulting
templates:
  - templates/gateway-config.yaml
  - templates/networkpolicy.yaml
  - templates/role.yaml
  - templates/rolebinding.yaml
  - templates/serviceaccount.yaml
release:
  name: openshell
  namespace: my-namespace

tests:
  - it: defaults sandbox_namespace to release namespace in the TOML config
    template: templates/gateway-config.yaml
    asserts:
      - matchRegex:
          path: data["gateway.toml"]
          pattern: 'sandbox_namespace\s*=\s*"my-namespace"'

  - it: uses explicit sandboxNamespace when set
    template: templates/gateway-config.yaml
    set:
      server.sandboxNamespace: other-ns
    asserts:
      - matchRegex:
          path: data["gateway.toml"]
          pattern: 'sandbox_namespace\s*=\s*"other-ns"'

  - it: defaults NetworkPolicy namespace to release namespace
    template: templates/networkpolicy.yaml
    set:
      networkPolicy.enabled: true
    asserts:
      - equal:
          path: metadata.namespace
          value: my-namespace

  - it: uses explicit sandboxNamespace for NetworkPolicy
    template: templates/networkpolicy.yaml
    set:
      networkPolicy.enabled: true
      server.sandboxNamespace: other-ns
    asserts:
      - equal:
          path: metadata.namespace
          value: other-ns

  - it: uses explicit sandboxNamespace for sandbox RBAC
    template: templates/role.yaml
    set:
      server.sandboxNamespace: other-ns
    asserts:
      - equal:
          path: metadata.namespace
          value: other-ns

  - it: grants only pod get for sandbox token bootstrap
    template: templates/role.yaml
    asserts:
      - contains:
          path: rules
          content:
            apiGroups:
              - ""
            resources:
              - pods
            verbs:
              - get

  - it: grants sandbox RBAC for proxy-pod supervisor Deployments
    template: templates/role.yaml
    set:
      supervisor.topology: proxy-pod
    asserts:
      - contains:
          path: rules
          content:
            apiGroups:
              - apps
            resources:
              - deployments
            verbs:
              - create
              - delete
              - get
              - list
              - watch

  - it: grants ReplicaSet get for proxy-pod supervisor token bootstrap
    template: templates/role.yaml
    set:
      supervisor.topology: proxy-pod
    asserts:
      - contains:
          path: rules
          content:
            apiGroups:
              - apps
            resources:
              - replicasets
            verbs:
              - get

  - it: grants proxy-pod Service Secret and NetworkPolicy RBAC only in proxy-pod mode
    template: templates/role.yaml
    set:
      supervisor.topology: proxy-pod
    asserts:
      - contains:
          path: rules
          content:
            apiGroups:
              - ""
            resources:
              - services
              - secrets
            verbs:
              - create
              - delete
              - get
              - list
              - watch
      - contains:
          path: rules
          content:
            apiGroups:
              - networking.k8s.io
            resources:
              - networkpolicies
            verbs:
              - create
              - delete
              - get
              - list
              - watch

  - it: omits proxy-pod RBAC in the default combined topology
    template: templates/role.yaml
    asserts:
      - notContains:
          path: rules
          content:
            apiGroups:
              - apps
            resources:
              - deployments
            verbs:
              - create
              - delete
              - get
              - list
              - watch
      - notContains:
          path: rules
          content:
            apiGroups:
              - apps
            resources:
              - replicasets
            verbs:
              - get
      - notContains:
          path: rules
          content:
            apiGroups:
              - ""
            resources:
              - services
              - secrets
            verbs:
              - create
              - delete
              - get
              - list
              - watch
      - notContains:
          path: rules
          content:
            apiGroups:
              - networking.k8s.io
            resources:
              - networkpolicies
            verbs:
              - create
              - delete
              - get
              - list
              - watch

  - it: uses explicit sandboxNamespace for sandbox RoleBinding
    template: templates/rolebinding.yaml
    set:
      server.sandboxNamespace: other-ns
    asserts:
      - equal:
          path: metadata.namespace
          value: other-ns

  - it: uses explicit sandboxNamespace for sandbox ServiceAccount
    template: templates/serviceaccount.yaml
    set:
      server.sandboxNamespace: other-ns
    asserts:
      - equal:
          path: metadata.namespace
          value: other-ns
        documentIndex: 1
