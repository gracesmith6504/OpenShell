{{- if and .Values.server.credentialDrivers.kubernetesSecrets.enabled .Values.server.credentialDrivers.kubernetesSecrets.rbac.create }}
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "openshell.fullname" . }}-credential-secrets
  namespace: {{ include "openshell.credentialKubernetesSecretsNamespace" . }}
  labels:
    {{- include "openshell.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "openshell.fullname" . }}-credential-secrets
subjects:
  - kind: ServiceAccount
    name: {{ include "openshell.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
{{- end }}
