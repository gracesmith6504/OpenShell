apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "openshell.fullname" . }}-sandbox
  namespace: {{ include "openshell.sandboxNamespace" . }}
  labels:
    {{- include "openshell.labels" . | nindent 4 }}
rules:
  - apiGroups:
      - agents.x-k8s.io
    resources:
      - sandboxes
      - sandboxes/status
    verbs:
      - create
      - delete
      - get
      - list
      - patch
      - update
      - watch
  - apiGroups:
      - ""
    resources:
      - events
    verbs:
      - get
      - list
      - watch
  # Per-sandbox identity: TokenReview authenticates the projected token from
  # the configured sandbox service account, then the gateway resolves the
  # returned pod name and UID to the pod's `openshell.io/sandbox-id`
  # annotation. patch is intentionally NOT granted — the annotation is set
  # once at pod create and must remain immutable for the lifetime of the
  # sandbox. create/delete/list/watch are intentionally not granted; the Agent
  # Sandbox controller creates agent pods, and proxy-pod supervisors are
  # managed through per-sandbox Deployments.
  - apiGroups:
      - ""
    resources:
      - pods
    verbs:
      - get
  {{- if eq (.Values.supervisor.topology | default "combined") "proxy-pod" }}
  # Proxy-pod topology creates one supervisor Deployment, one supervisor
  # Service, and one CA Secret per sandbox. All are owner-referenced to the
  # Sandbox CR for garbage collection. The gateway also reads the generated
  # ReplicaSet during K8s ServiceAccount bootstrap to verify the supervisor
  # pod's Pod -> ReplicaSet -> Deployment -> Sandbox owner chain. These
  # permissions are only rendered when the Kubernetes driver is configured for
  # proxy-pod topology.
  - apiGroups:
      - apps
    resources:
      - deployments
    verbs:
      - create
      - delete
      - get
      - list
      - watch
  - apiGroups:
      - apps
    resources:
      - replicasets
    verbs:
      - get
  - apiGroups:
      - ""
    resources:
      - services
      - secrets
    verbs:
      - create
      - delete
      - get
      - list
      - watch
  - apiGroups:
      - networking.k8s.io
    resources:
      - networkpolicies
    verbs:
      - create
      - delete
      - get
      - list
      - watch
  {{- end }}
