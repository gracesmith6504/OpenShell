{{- if and (eq (include "openshell.runtimeConfigEnabled" .) "true") (not .Values.server.runtimeConfig.existingConfigMap) }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "openshell.runtimeConfigMapName" . }}
  labels:
    {{- include "openshell.labels" . | nindent 4 }}
data:
  {{ include "openshell.runtimeConfigFilename" . }}: |
    [openshell.runtime.settings]
    {{- range $key, $value := (.Values.server.runtimeConfig.settings | default dict) }}
    {{ $key }} = {{ $value | toJson }}
    {{- end }}
{{- end }}
