apiVersion: v1
kind: Service
metadata:
  name: {{ include "openshell.peerServiceName" . }}
  labels:
    {{- include "openshell.labels" . | nindent 4 }}
spec:
  clusterIP: None
  publishNotReadyAddresses: true
  ports:
    - port: {{ .Values.service.port }}
      targetPort: grpc
      protocol: TCP
      name: grpc
      appProtocol: grpc
  selector:
    {{- include "openshell.selectorLabels" . | nindent 4 }}
