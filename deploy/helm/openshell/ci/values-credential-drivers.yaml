# Local Kubernetes Secrets credential-driver validation overlay.
#
# Use with:
#   skaffold run -p credential-drivers
#
server:
  credentialDrivers:
    default: kubernetes-secrets
    kubernetesSecrets:
      enabled: true
      namespace: openshell
