# CI/dev overlay for exercising the gateway runtime settings file. Add this file
# to the openshell release valuesFiles to mount a runtime ConfigMap and configure
# the gateway to watch it.
server:
  runtimeConfig:
    enabled: true
    settings:
      providers_v2_enabled: true
