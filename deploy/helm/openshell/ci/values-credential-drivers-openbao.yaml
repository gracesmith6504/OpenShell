# Local OpenBao credential-driver validation overlay.
#
# Use with a Skaffold profile or Helm upgrade that also deploys OpenBao.
# This assumes OpenBao is installed in the `openbao` namespace and has a
# Kubernetes auth role named `openshell-gateway` bound to the OpenShell gateway
# ServiceAccount in the `openshell` namespace.

server:
  credentialDrivers:
    default: openbao
    openbao:
      enabled: true
      address: http://openbao.openbao.svc.cluster.local:8200
      role: openshell-gateway
